<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Recognition Attendance System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
}

.container{
    width:450px;
    margin:50px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

video{
    width:100%;
    border:2px solid #333;
    border-radius:10px;
}

button{
    margin:10px;
    padding:10px 20px;
    border:none;
    background:#007BFF;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table,th,td{
    border:1px solid #000;
}

th,td{
    padding:10px;
}
</style>

</head>
<body>

<div class="container">

<h2>Face Recognition Attendance System</h2>

<video id="video" autoplay></video>

<br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="markAttendance()">Mark Attendance</button>

<table>
<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>

<tr id="attendanceRow">
<td>Student Name</td>
<td>-</td>
<td>-</td>
<td>Absent</td>
</tr>

</table>

</div>

<script>

function startCamera(){

navigator.mediaDevices.getUserMedia({video:true})

.then(function(stream){

document.getElementById("video").srcObject=stream;

})

.catch(function(error){

alert("Camera access denied.");

});

}

function markAttendance(){

let now=new Date();

let date=now.toLocaleDateString();

let time=now.toLocaleTimeString();

let row=document.getElementById("attendanceRow");

row.cells[1].innerHTML=date;

row.cells[2].innerHTML=time;

row.cells[3].innerHTML="Present";

alert("Attendance Marked");

}

</script>

</body>
</html>
